<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Diente de León · Joyería Artesanal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --white:#fff;--off:#fafaf8;--cream:#f5f0ea;--cream2:#ede6dc;
  --text:#1a1612;--muted:#7a7068;--light:#b0a898;
  --gold:#b8922a;--gold-light:#e8c96a;--teal:#7ab8b0;--rose:#d4788a;--sage:#8aaa88;
  --border:#e8e2da;--border2:#d5cfc7;
}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;font-weight:300;background:var(--white);color:var(--text);font-size:13px;letter-spacing:0.03em;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,.serif{font-family:'Cormorant Garamond',serif;font-weight:300}
button,input{font-family:'Montserrat',sans-serif}
img{display:block}
.announce{background:var(--text);color:rgba(255,255,255,0.65);text-align:center;padding:0.55rem 1rem;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 2.5rem;height:72px;transition:all 0.3s}
.nav-left,.nav-right{display:flex;align-items:center;gap:2rem}
.nav-right{justify-content:flex-end;gap:1.6rem}
.nav-link{font-size:0.75rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text);text-decoration:none;cursor:pointer;transition:color 0.2s,border-color 0.2s;background:none;border:none;border-bottom:2px solid transparent;padding-bottom:2px;font-weight:500}
.nav-link:hover{color:var(--gold);border-bottom-color:var(--gold)}
.nav-logo{cursor:pointer;display:flex;flex-direction:row;align-items:center;gap:10px}
.nav-logo img{height:52px;width:52px;border-radius:50%;box-shadow:0 2px 12px rgba(0,0,0,0.10);transition:transform 0.7s cubic-bezier(0.4,0,0.2,1)}
.nav-logo img.spinning{transform:rotate(360deg)}
.nav-logo-text{display:none;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--text);white-space:nowrap}
@media(max-width:768px){.nav-logo-text{display:block}}
.nav-burger{display:none}
.menu-overlay{display:none}
.menu-panel{display:none}
.cart-btn{background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:6px;transition:color 0.2s;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase}
.cart-btn:hover{color:var(--text)}
.cart-count{background:var(--rose);color:white;border-radius:50%;width:16px;height:16px;font-size:0.5rem;display:flex;align-items:center;justify-content:center;font-weight:500}
.page{display:none;animation:fadeIn 0.4s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero{min-height:92vh;background:var(--cream);display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden}
.hero-left{display:flex;flex-direction:column;justify-content:center;padding:8vw 5vw 8vw 8vw;position:relative;z-index:2}
.hero h1{font-size:clamp(4rem,7vw,6.5rem);line-height:0.95;font-style:normal;font-family:'Great Vibes',cursive;margin-bottom:1.8rem;color:var(--text)}
.hero h1 span{display:block;font-style:normal;font-family:'Montserrat',sans-serif;font-size:0.2em;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:0.8rem;font-weight:600;border-bottom:2px solid var(--gold);padding-bottom:0.6em;display:inline-block;position:relative;cursor:default;transition:border-color 0.3s,letter-spacing 0.3s}
.hero h1 span:hover{border-bottom-color:var(--gold-light);letter-spacing:0.55em}
@keyframes shimmerGold{0%{background-position:-200% 0}100%{background-position:200% 0}}
.hero-desc{font-size:0.88rem;color:var(--muted);line-height:2;margin-bottom:2.5rem;max-width:380px}
.hero-btns{display:flex;gap:0.8rem;flex-wrap:wrap}
.hero-right{background:var(--cream2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.strip{display:grid;grid-template-columns:repeat(4,1fr);background:var(--text)}
@media(max-width:1024px){.strip{grid-template-columns:repeat(2,1fr)}.strip-item:nth-child(2){border-right:none}.strip-item:nth-child(3){border-top:1px solid rgba(255,255,255,0.1)}.strip-item:nth-child(4){border-top:1px solid rgba(255,255,255,0.1)}}
.strip-item{padding:2rem 1rem;text-align:center;border-right:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;align-items:center;gap:0.6rem;transition:background 0.28s,transform 0.22s,box-shadow 0.22s;cursor:default}
.strip-item:last-child{border-right:none}
.strip-item:hover{background:var(--gold);transform:translateY(-5px);box-shadow:0 16px 48px rgba(0,0,0,0.28);z-index:2}
.strip-item:hover .strip-ico{transform:scale(1.3);color:white}
.strip-item:hover .strip-t{color:white}
.strip-item:hover .strip-s{color:rgba(255,255,255,0.85)}
.strip-ico{color:var(--gold);transition:transform 0.25s,color 0.25s}
.strip-ico svg{width:34px;height:34px}
.strip-t{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,1);font-weight:700;transition:color 0.25s}
.strip-s{font-size:0.62rem;color:rgba(255,255,255,0.55);transition:color 0.25s;letter-spacing:0.03em}
.sec{padding:5rem 2.5rem}
.sec-head{margin-bottom:3rem}
.sec-head.center{text-align:center;display:flex;flex-direction:column;align-items:center}
.sec-eyebrow{font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--light);margin-bottom:0.8rem}
.sec-title{font-size:clamp(2rem,3.5vw,3rem);font-style:italic;line-height:1.05}
.sec-title em{font-style:normal;color:var(--gold)}
.sec-line{width:40px;height:1px;background:var(--border2);margin-top:1.2rem}
.filters{display:flex;border-bottom:2px solid var(--border);margin-bottom:0;overflow-x:auto;scrollbar-width:none;gap:0.2rem;padding:0 0.5rem}
.filters::-webkit-scrollbar{display:none}
.filters-wrap{position:relative}
.filters-arrow{display:none}
.filters-arrow{display:none}
@keyframes filtersPeek{0%{transform:translateX(0)}30%{transform:translateX(-50px)}60%{transform:translateX(0)}100%{transform:translateX(0)}}
@keyframes arrowBounce{0%,100%{transform:translateY(-50%) translateX(0)}50%{transform:translateY(-50%) translateX(5px)}}
.ftab{background:none;border:none;border-bottom:3px solid transparent;padding:1rem 1.6rem;font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);cursor:pointer;white-space:nowrap;margin-bottom:-2px;transition:all 0.22s;font-family:'Montserrat',sans-serif;font-weight:500}
.ftab:hover{color:var(--gold);background:var(--cream)}
.ftab.active{color:var(--text);border-bottom-color:var(--gold);font-weight:600}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));border-left:1px solid var(--border);border-top:1px solid var(--border)}
.pcard{border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;transition:all 0.3s;background:var(--white)}
.pcard:hover{z-index:2;box-shadow:0 12px 48px rgba(0,0,0,0.14);transform:translateY(-4px)}
.pcard-img{aspect-ratio:1;background:var(--cream);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pcard-img canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pcard-img .preal{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.pcard-overlay{position:absolute;inset:0;background:linear-gradient(transparent 35%,rgba(26,22,18,0.55));opacity:0;transition:opacity 0.3s;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:1.2rem;gap:0.4rem}
.pcard:hover .pcard-overlay{opacity:1}
.qadd{background:var(--gold);color:white;border:none;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.65rem 1.4rem;cursor:pointer;width:100%;transition:all 0.3s;transform:translateY(8px);font-weight:500}
.pcard:hover .qadd{transform:translateY(0)}
.qadd:hover{background:var(--text)}
.pbadge{position:absolute;top:10px;left:10px;font-size:0.54rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.25rem 0.65rem;color:white;z-index:1;font-weight:500}
.pinfo{padding:1.2rem 1.2rem 1.4rem;cursor:pointer}
.pname{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.15rem;margin-bottom:0.25rem;line-height:1.2;color:var(--text)}
.ptag{font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--light);margin-bottom:0.5rem}
.pprice{font-size:0.9rem;color:var(--gold);font-weight:500}
/* ── SKELETON LOADING ── */
.skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));border-left:1px solid var(--border);border-top:1px solid var(--border)}
.skeleton-card{border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.skeleton-img{aspect-ratio:1;background:linear-gradient(90deg,var(--cream) 25%,var(--cream2) 50%,var(--cream) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
.skeleton-body{padding:1.2rem}
.skeleton-line{height:10px;background:linear-gradient(90deg,var(--cream) 25%,var(--cream2) 50%,var(--cream) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;margin-bottom:0.6rem}
.skeleton-line.short{width:60%}
.skeleton-line.price{width:40%;height:14px;margin-top:0.4rem}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* ── PRODUCT MODAL ── */
.pmodal-bg{position:fixed;inset:0;background:rgba(26,22,18,0.7);z-index:400;display:flex;align-items:center;justify-content:center;padding:1.5rem;animation:fadeIn 0.25s ease}
.pmodal{background:var(--white);width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,0.3)}
.pmodal-head{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.pmodal-head span{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--light)}
.pmodal-close{background:none;border:none;cursor:pointer;font-size:1.6rem;color:var(--muted);line-height:1;transition:color 0.2s}
.pmodal-close:hover{color:var(--text)}
.pmodal-body{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden}
.pmodal-img{background:var(--cream);display:flex;align-items:center;justify-content:center;position:relative;padding:2rem;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none}
.pmodal-img canvas{width:200px;height:200px}
.pmodal-img .mreal{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;-webkit-user-drag:none;pointer-events:none}
.pmodal-img .mbadge{position:absolute;top:12px;left:12px;font-size:0.54rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.25rem 0.65rem;color:white;font-weight:500;z-index:3}
.zoom-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(26,22,18,0.55);color:white;font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.4rem 0.85rem;border-radius:50px;pointer-events:none;z-index:3;opacity:0;animation:fadeInHint 0.5s ease 0.4s forwards}
@keyframes fadeInHint{to{opacity:0.85}}
.pmodal-info{padding:2rem 1.8rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto}
.pmodal-cat{font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--light)}
.pmodal-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.6rem;line-height:1.15;color:var(--text)}
.pmodal-desc{font-size:0.72rem;color:var(--muted);line-height:1.9}
.pmodal-pills{display:flex;flex-wrap:wrap;gap:0.35rem}
.pmodal-pill{border:1px solid var(--border);padding:0.22rem 0.6rem;font-size:0.54rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.pmodal-price-row{display:flex;align-items:baseline;gap:0.6rem;border-top:1px solid var(--border);padding-top:1rem}
.pmodal-price{font-size:1.4rem;color:var(--gold);font-weight:500}
.pmodal-ship{font-size:0.6rem;color:var(--light);letter-spacing:0.06em}
.pmodal-actions{display:flex;flex-direction:column;gap:0.5rem}
@media(max-width:540px){.pmodal-bg{padding:0.6rem;align-items:flex-start;padding-top:0.8rem}.pmodal{max-height:95vh;max-width:100%;width:100%;box-sizing:border-box}.pmodal-head{padding:0.65rem 1rem}.pmodal-head span{font-size:0.5rem}.pmodal-body{grid-template-columns:minmax(0,1fr) !important;overflow-y:auto;width:100%}.pmodal-img,.pmodal-info{min-width:0;max-width:100%;box-sizing:border-box}.pmodal-img{padding:0.5rem;min-height:auto;aspect-ratio:2/1;background:white;width:100%}.pmodal-img canvas{width:120px;height:120px}.pmodal-img .mreal{position:relative !important;inset:auto !important;width:100% !important;height:100% !important;max-height:200px !important;object-fit:contain !important;padding:0.3rem}.pmodal-info{padding:0.9rem 1rem 1rem !important;gap:0.5rem !important;width:100%;overflow:hidden}.pmodal-info > *{max-width:100%;box-sizing:border-box}.pmodal-name{font-size:1.2rem !important;margin:0.1rem 0 !important;line-height:1.2 !important;word-wrap:break-word;overflow-wrap:break-word}.pmodal-cat{font-size:0.5rem !important;margin-bottom:0 !important}.pmodal-desc{font-size:0.7rem !important;line-height:1.5 !important;margin:0.2rem 0 !important;word-wrap:break-word;overflow-wrap:break-word;max-width:100%}.pmodal-pills{gap:0.3rem !important;margin:0.3rem 0 !important;flex-wrap:wrap;max-width:100%}.pmodal-pill{font-size:0.5rem !important;padding:0.25rem 0.55rem !important}.pmodal-price-row{padding:0.5rem 0 !important;margin:0.2rem 0 !important}.pmodal-price{font-size:1.4rem !important}.pmodal-actions{gap:0.4rem !important;margin-top:0.4rem !important;width:100%;max-width:100%;display:flex;flex-direction:column}.pmodal-actions .btn{padding:0.7rem !important;font-size:0.6rem !important;width:100% !important;max-width:100%;box-sizing:border-box;flex-shrink:0}}
.pers-wrap{max-width:960px;margin:0 auto;padding:0 2.5rem 5rem}
.pers-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border)}
.pers-preview{background:var(--cream);padding:3rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem;border-right:1px solid var(--border)}
.pers-preview svg{width:240px;height:240px;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.12))}
.pers-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.3rem;text-align:center}
.pers-price{font-size:0.9rem;color:var(--gold)}
.pers-desc{font-size:0.64rem;color:var(--muted);text-align:center;line-height:1.8;max-width:200px}
.pers-opts{padding:2.5rem 2rem;display:flex;flex-direction:column;gap:1.6rem;overflow-y:auto}
.opt-label{font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:0.6rem}
.metal-row{display:flex;gap:0.6rem}
.mbtn{flex:1;border:1px solid var(--border);background:white;padding:0.7rem 0.5rem;cursor:pointer;font-size:0.58rem;letter-spacing:0.08em;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:5px;transition:all 0.2s}
.mbtn:hover,.mbtn.sel{border-color:var(--text);color:var(--text)}
.mbtn.sel{border-width:1.5px;background:var(--off)}
.mswatch{width:22px;height:22px;border-radius:50%;border:1px solid rgba(0,0,0,0.08)}
.bead-row{display:flex;gap:0.5rem;flex-wrap:wrap}
.bead{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all 0.2s;flex-shrink:0}
.bead.sel{border-color:var(--text);transform:scale(1.2)}
.shape-row{display:flex;gap:0.4rem;flex-wrap:wrap}
.spill{background:white;border:1px solid var(--border);padding:0.32rem 0.7rem;font-size:0.58rem;letter-spacing:0.06em;color:var(--muted);cursor:pointer;transition:all 0.2s}
.spill:hover,.spill.sel{background:var(--text);color:white;border-color:var(--text)}
.stone-row{display:flex;gap:0.4rem;flex-wrap:wrap}
.stpill{background:white;border:1px solid var(--border);padding:0.3rem 0.65rem;font-size:0.56rem;color:var(--muted);cursor:pointer;transition:all 0.2s}
.stpill:hover,.stpill.sel{background:var(--text);color:white;border-color:var(--text)}
.pers-actions{display:flex;flex-direction:column;gap:0.5rem;margin-top:0.4rem}
.btn{border:none;cursor:pointer;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.85rem 2rem;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-dark{background:var(--text);color:white}
.btn-dark:hover{background:var(--gold)}
.btn-outline{background:var(--text);color:white;border:1px solid var(--text)}
.btn-outline:hover{background:var(--gold);color:white;border-color:var(--gold)}
.btn-wa{background:white;color:#1a6130;border:1px solid rgba(26,97,48,0.4)}
.btn-wa:hover{background:#1a6130;color:white}
.btn-sm{padding:0.55rem 1.2rem;font-size:0.6rem}
.btn-full{width:100%}
.about-grid{display:grid;grid-template-columns:1fr 1.4fr;border:1px solid var(--border);max-width:920px;margin:0 auto;align-items:start}
.about-vis{background:var(--cream);display:flex;align-items:center;justify-content:center;padding:2.5rem 2rem;border-right:1px solid var(--border);position:sticky;top:80px;align-self:start}
.about-circ{width:180px;height:180px;border-radius:50%;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,0.1)}
.about-text{padding:2.5rem 2.5rem;display:flex;flex-direction:column}
.about-text h2{font-size:2.2rem;font-style:italic;margin-bottom:1.2rem}
.about-text p{font-size:0.74rem;color:var(--muted);line-height:2;margin-bottom:0.8rem}
.pills{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:1.2rem;margin-bottom:1.5rem}
.pill{border:1px solid var(--border);padding:0.25rem 0.7rem;font-size:0.56rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.editorial{background:var(--text);color:white;padding:5rem 8vw;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.editorial-q{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3.2rem);font-style:italic;line-height:1.15;font-weight:300}
.editorial-q em{color:var(--gold-light);font-style:normal}
.editorial-body{font-size:0.74rem;color:rgba(255,255,255,0.55);line-height:2}
.editorial-body strong{color:rgba(255,255,255,0.85);font-weight:400}
.editorial-btns{display:flex;gap:0.6rem;margin-top:1.8rem}
.btn-gold{background:var(--gold);color:white;border:none;cursor:pointer;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.8rem 1.8rem;transition:background 0.2s}
.btn-gold:hover{background:var(--gold-light);color:var(--text)}
.btn-outline-white{background:none;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.25);cursor:pointer;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.8rem 1.8rem;transition:all 0.2s}
.btn-outline-white:hover{color:white;border-color:rgba(255,255,255,0.6)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s}
.overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;right:0;top:0;height:100%;width:360px;background:white;z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1)}
.overlay.open .drawer{transform:translateX(0)}
.drawer-head{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 1.8rem;border-bottom:1px solid var(--border)}
.drawer-head h2{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.2rem}
.drawer-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted);line-height:1}
.drawer-body{flex:1;overflow-y:auto;padding:1rem 1.8rem}
.drawer-empty{text-align:center;padding:4rem 0;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--light);font-size:1.1rem}
.cart-item{display:flex;gap:0.9rem;padding:1rem 0;border-bottom:1px solid var(--border);align-items:center}

function jSVG(shape,metal,bead,stone,W,H){
  const m=metalColors[metal]||'#d4af37',sc=stoneColors[stone]||null,cx=W/2,cy=H/2,r=Math.min(W,H)/220;
  let h='';
  if(shape==='flower'){[[cx,cy-38*r],[cx+36*r,cy-12*r],[cx+22*r,cy+30*r],[cx-22*r,cy+30*r],[cx-36*r,cy-12*r]].forEach(([px,py])=>{const a=Math.atan2(py-cy,px-cx)*180/Math.PI+90;h+=`<ellipse cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" rx="${14*r}" ry="${20*r}" fill="${m}" opacity="0.22" stroke="${m}" stroke-width="${1.5*r}" transform="rotate(${a} ${px.toFixed(1)} ${py.toFixed(1)})"/>`;});for(let i=0;i<22;i++){const a=i/22*Math.PI*2;h+=`<circle cx="${(cx+Math.cos(a)*38*r).toFixed(1)}" cy="${(cy+Math.sin(a)*38*r).toFixed(1)}" r="${i%3===0?4.5*r:3*r}" fill="${gBC(bead,i)}"/>`;}h+=`<circle cx="${cx}" cy="${cy}" r="${sc?13*r:9*r}" fill="${sc||m}" stroke="${m}" stroke-width="${1.5*r}"/>`;}

  else if(shape==='hoop'){h+=`<circle cx="${cx}" cy="${cy}" r="${58*r}" fill="none" stroke="${m}" stroke-width="${12*r}"/>`;for(let i=0;i<30;i++){const a=i/30*Math.PI*2;h+=`<circle cx="${(cx+Math.cos(a)*58*r).toFixed(1)}" cy="${(cy+Math.sin(a)*58*r).toFixed(1)}" r="${i%4===0?4.5*r:3*r}" fill="${gBC(bead,i)}"/>`;}if(sc)h+=`<circle cx="${cx}" cy="${cy}" r="${16*r}" fill="${sc}" stroke="${m}" stroke-width="${1.5*r}"/>`;}
  else if(shape==='dream'){h+=`<circle cx="${cx}" cy="${(cy-12*r).toFixed(1)}" r="${44*r}" fill="none" stroke="${m}" stroke-width="${1.5*r}"/>`;for(let i=0;i<8;i++){const a=i/8*Math.PI*2;h+=`<line x1="${cx}" y1="${(cy-12*r).toFixed(1)}" x2="${(cx+Math.cos(a)*44*r).toFixed(1)}" y2="${(cy-12*r+Math.sin(a)*44*r).toFixed(1)}" stroke="${m}" stroke-width="${r}" opacity="0.4"/>`;}for(const f of[0.35,0.65,1])for(let i=0;i<20;i++){const a=i/20*Math.PI*2;h+=`<circle cx="${(cx+Math.cos(a)*44*r*f).toFixed(1)}" cy="${(cy-12*r+Math.sin(a)*44*r*f).toFixed(1)}" r="${2.5*r}" fill="${gBC(bead,i)}"/>`;}[[cx-18*r,cy+36*r],[cx,cy+36*r],[cx+18*r,cy+36*r]].forEach(([x,y],i)=>{for(let k=0;k<(i===1?4:3);k++)h+=`<circle cx="${x.toFixed(1)}" cy="${(y+k*10*r).toFixed(1)}" r="${3*r}" fill="${gBC(bead,i*4+k)}"/>`;});if(sc)h+=`<circle cx="${cx}" cy="${(cy-12*r).toFixed(1)}" r="${13*r}" fill="${sc}" stroke="${m}" stroke-width="${1.5*r}"/>`;}
  else if(shape==='star'){const sp=Array.from({length:10},(_,i)=>{const a=i/10*Math.PI*2-Math.PI/2,ri=i%2===0?48*r:24*r;return`${i===0?'M':'L'}${(cx+Math.cos(a)*ri).toFixed(1)},${(cy+Math.sin(a)*ri).toFixed(1)}`;}).join(' ')+'Z';h+=`<path d="${sp}" fill="${m}" opacity="0.22" stroke="${m}" stroke-width="${1.5*r}"/>`;for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2;h+=`<circle cx="${(cx+Math.cos(a)*48*r).toFixed(1)}" cy="${(cy+Math.sin(a)*48*r).toFixed(1)}" r="${4.5*r}" fill="${gBC(bead,i)}"/>`;}h+=sc?`<circle cx="${cx}" cy="${cy}" r="${12*r}" fill="${sc}" stroke="${m}" stroke-width="${1.5*r}"/>`:`<circle cx="${cx}" cy="${cy}" r="${8*r}" fill="${m}"/>`;}
  else if(shape==='butterfly'){h+=`<path d="M${cx} ${cy} C${cx-8*r} ${cy-8*r} ${cx-44*r} ${cy-18*r} ${cx-42*r} ${cy} C${cx-40*r} ${cy+18*r} ${cx-8*r} ${cy+8*r} ${cx} ${cy}Z" fill="${m}" opacity="0.22" stroke="${m}" stroke-width="${1.5*r}"/>`;h+=`<path d="M${cx} ${cy} C${cx+8*r} ${cy-8*r} ${cx+44*r} ${cy-18*r} ${cx+42*r} ${cy} C${cx+40*r} ${cy+18*r} ${cx+8*r} ${cy+8*r} ${cx} ${cy}Z" fill="${m}" opacity="0.22" stroke="${m}" stroke-width="${1.5*r}"/>`;for(let i=0;i<16;i++){const a=i/8*Math.PI,s=i<8?-1:1;h+=`<circle cx="${(cx+s*(20+Math.cos(a)*22)*r).toFixed(1)}" cy="${(cy+Math.sin(a)*16*r).toFixed(1)}" r="${2.8*r}" fill="${gBC(bead,i)}"/>`;}h+=`<ellipse cx="${cx}" cy="${cy}" rx="${5*r}" ry="${16*r}" fill="${m}" opacity="0.5"/>`;}

  h+=`<line x1="${cx}" y1="${(cy-60*r).toFixed(1)}" x2="${cx}" y2="${(cy-46*r).toFixed(1)}" stroke="${m}" stroke-width="${2.5*r}" stroke-linecap="round"/>`;
  return h;
}

function drawOnCanvas(canvas,p){
  if(!canvas)return;
  const w=canvas.width,h=canvas.height;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 220 220">${jSVG(p.shape||'flower',p.metal||'gold',p.mc||'#c0392b',p.stone||'none',220,220)}</svg>`;
  const blob=new Blob([svg],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{ctx.drawImage(img,0,0,w,h);URL.revokeObjectURL(url);};
  img.src=url;
}

  const stateRef=useRef({startDist:0,startScale:1,startPos:{x:0,y:0},lastTouches:null,lastTap:0,isPanning:false,startMid:{x:0,y:0}});
  useEffect(()=>{
    if(cvRef.current&&!p.imagen_url)drawOnCanvas(cvRef.current,p);
  },[p]);
  useEffect(()=>{
    document.body.style.overflow='hidden';
    return()=>{document.body.style.overflow='';};
  },[]);
  function dist(t1,t2){return Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);}
  function mid(t1,t2){return{x:(t1.clientX+t2.clientX)/2,y:(t1.clientY+t2.clientY)/2};}
  function clampPos(s,x,y){
    const el=containerRef.current;if(!el)return{x:0,y:0};
    const w=el.clientWidth,h=el.clientHeight;
    const maxX=Math.max(0,(w*s-w)/2),maxY=Math.max(0,(h*s-h)/2);
    return{x:Math.max(-maxX,Math.min(maxX,x)),y:Math.max(-maxY,Math.min(maxY,y))};
  }
  function onTouchStart(e){
    const st=stateRef.current;
    if(e.touches.length===2){
      e.preventDefault();
      st.startDist=dist(e.touches[0],e.touches[1]);
      st.startScale=scale;
      st.startMid=mid(e.touches[0],e.touches[1]);
      st.startPos={...pos};
      st.isPanning=false;
    }else if(e.touches.length===1){
      const now=Date.now();
      if(now-st.lastTap<280){
        if(scale>1.2){setScale(1);setPos({x:0,y:0});}
        else{setScale(2.5);setPos({x:0,y:0});}
        st.lastTap=0;
      }else{
        st.lastTap=now;
        if(scale>1){st.isPanning=true;st.startPos={x:e.touches[0].clientX-pos.x,y:e.touches[0].clientY-pos.y};}
      }
    }
  }
  function onTouchMove(e){
    const st=stateRef.current;
    if(e.touches.length===2&&st.startDist>0){
      e.preventDefault();
      const d=dist(e.touches[0],e.touches[1]);
      const s=Math.max(1,Math.min(4,st.startScale*(d/st.startDist)));
      setScale(s);
      const c=clampPos(s,st.startPos.x,st.startPos.y);
      setPos(c);
    }else if(e.touches.length===1&&st.isPanning&&scale>1){
      e.preventDefault();
      const c=clampPos(scale,e.touches[0].clientX-st.startPos.x,e.touches[0].clientY-st.startPos.y);
      setPos(c);
    }
  }
  function onTouchEnd(){

    if(scale<1.05){setScale(1);setPos({x:0,y:0});}

function RotatingText(){

function GoldSparkles(){
  const cvRef=useRef(null);
  useEffect(()=>{
    const canvas=cvRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;
    const particles=Array.from({length:28},()=>({x:Math.random()*W,y:Math.random()*H,r:1+Math.random()*2.5,vx:(Math.random()-0.5)*0.3,vy:-(0.2+Math.random()*0.4),alpha:Math.random(),dalpha:(Math.random()*0.008+0.003)*(Math.random()<0.5?1:-1),hue:40+Math.random()*20}));
    let raf;
    function tick(){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.alpha+=p.dalpha;if(p.alpha<=0||p.alpha>=1)p.dalpha*=-1;if(p.y<-10)p.y=H+10;if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,p.alpha))*0.7;ctx.fillStyle=`hsl(${p.hue},70%,55%)`;ctx.beginPath();for(let i=0;i<4;i++){const a=i*Math.PI/2;ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+Math.cos(a)*p.r*2,p.y+Math.sin(a)*p.r*2);}ctx.strokeStyle=`hsl(${p.hue},70%,55%)`;ctx.lineWidth=0.8;ctx.stroke();ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();});raf=requestAnimationFrame(tick);}
    tick();return()=>cancelAnimationFrame(raf);
  },[]);
  return<canvas ref={cvRef} width={520} height={700} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:1}}/>;
}

    const el=ref.current;if(!el)return;
