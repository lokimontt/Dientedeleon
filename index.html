<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Diente de León · Joyería Artesanal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --white:#fff;--off:#fafaf8;--cream:#f5f0ea;--cream2:#ede6dc;
  --text:#1a1612;--muted:#7a7068;--light:#b0a898;
  --gold:#b8922a;--gold-light:#e8c96a;--teal:#7ab8b0;--rose:#d4788a;--sage:#8aaa88;
  --border:#e8e2da;--border2:#d5cfc7;
}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;font-weight:300;background:var(--white);color:var(--text);font-size:13px;letter-spacing:0.03em;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,.serif{font-family:'Cormorant Garamond',serif;font-weight:300}
button,input{font-family:'Montserrat',sans-serif}
img{display:block}
.announce{background:var(--text);color:rgba(255,255,255,0.65);text-align:center;padding:0.55rem 1rem;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 2.5rem;height:72px;transition:all 0.3s}
.nav-left,.nav-right{display:flex;align-items:center;gap:2rem}
.nav-right{justify-content:flex-end;gap:1.6rem}
.nav-link{font-size:0.75rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text);text-decoration:none;cursor:pointer;transition:color 0.2s,border-color 0.2s;background:none;border:none;border-bottom:2px solid transparent;padding-bottom:2px;font-weight:500}
.nav-link:hover{color:var(--gold);border-bottom-color:var(--gold)}
.nav-logo{cursor:pointer;display:flex;flex-direction:row;align-items:center;gap:10px}
.nav-logo img{height:52px;width:52px;border-radius:50%;box-shadow:0 2px 12px rgba(0,0,0,0.10);transition:transform 0.7s cubic-bezier(0.4,0,0.2,1)}
.nav-logo img.spinning{transform:rotate(360deg)}
.nav-logo-text{display:none;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--text);white-space:nowrap}
@media(max-width:768px){.nav-logo-text{display:block}}
.cart-btn{background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:6px;transition:color 0.2s;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase}
.cart-btn:hover{color:var(--text)}
.cart-count{background:var(--rose);color:white;border-radius:50%;width:16px;height:16px;font-size:0.5rem;display:flex;align-items:center;justify-content:center;font-weight:500}
.page{display:none;animation:fadeIn 0.4s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero{min-height:92vh;background:var(--cream);display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden}
.hero-left{display:flex;flex-direction:column;justify-content:center;padding:8vw 5vw 8vw 8vw;position:relative;z-index:2}
.hero h1{font-size:clamp(4rem,7vw,6.5rem);line-height:0.95;font-style:normal;font-family:'Great Vibes',cursive;margin-bottom:1.8rem;color:var(--text)}
.hero h1 span{display:block;font-style:normal;font-family:'Montserrat',sans-serif;font-size:0.2em;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:0.8rem;font-weight:600;border-bottom:2px solid var(--gold);padding-bottom:0.6em;display:inline-block;position:relative;cursor:default;transition:border-color 0.3s,letter-spacing 0.3s}
.hero h1 span:hover{border-bottom-color:var(--gold-light);letter-spacing:0.55em}
.hero-desc{font-size:0.88rem;color:var(--muted);line-height:2;margin-bottom:2.5rem;max-width:380px}
.hero-btns{display:flex;gap:0.8rem;flex-wrap:wrap}
.hero-right{background:var(--cream2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hero-main-svg{position:relative;z-index:2;width:min(380px,60%);animation:floatSvg 6s ease-in-out infinite}
@keyframes floatSvg{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.strip{display:grid;grid-template-columns:repeat(4,1fr);background:var(--text)}
@media(max-width:1024px){.strip{grid-template-columns:repeat(2,1fr)}.strip-item:nth-child(2){border-right:none}.strip-item:nth-child(3){border-top:1px solid rgba(255,255,255,0.1)}.strip-item:nth-child(4){border-top:1px solid rgba(255,255,255,0.1)}}
.strip-item{padding:2rem 1rem;text-align:center;border-right:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;align-items:center;gap:0.6rem;transition:background 0.28s,transform 0.22s,box-shadow 0.22s;cursor:default}
.strip-item:last-child{border-right:none}
.strip-item:hover{background:var(--gold);transform:translateY(-5px);box-shadow:0 16px 48px rgba(0,0,0,0.28);z-index:2}
.strip-item:hover .strip-ico{transform:scale(1.3);color:white}
.strip-item:hover .strip-t{color:white}
.strip-item:hover .strip-s{color:rgba(255,255,255,0.85)}
.strip-ico{color:var(--gold);transition:transform 0.25s,color 0.25s}
.strip-ico svg{width:34px;height:34px}
.strip-t{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,1);font-weight:700;transition:color 0.25s}
.strip-s{font-size:0.62rem;color:rgba(255,255,255,0.55);transition:color 0.25s;letter-spacing:0.03em}
.sec{padding:5rem 2.5rem}
.sec-head{margin-bottom:3rem}
.sec-head.center{text-align:center;display:flex;flex-direction:column;align-items:center}
.sec-eyebrow{font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--light);margin-bottom:0.8rem}
.sec-title{font-size:clamp(2rem,3.5vw,3rem);font-style:italic;line-height:1.05}
.sec-title em{font-style:normal;color:var(--gold)}
.sec-line{width:40px;height:1px;background:var(--border2);margin-top:1.2rem}
.filters{display:flex;border-bottom:2px solid var(--border);margin-bottom:0;overflow-x:auto;scrollbar-width:none;gap:0.2rem;padding:0 0.5rem}
.filters::-webkit-scrollbar{display:none}
.ftab{background:none;border:none;border-bottom:3px solid transparent;padding:1rem 1.6rem;font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);cursor:pointer;white-space:nowrap;margin-bottom:-2px;transition:all 0.22s;font-family:'Montserrat',sans-serif;font-weight:500}
.ftab:hover{color:var(--gold);background:var(--cream)}
.ftab.active{color:var(--text);border-bottom-color:var(--gold);font-weight:600}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));border-left:1px solid var(--border);border-top:1px solid var(--border)}
.pcard{border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;transition:all 0.3s;background:var(--white)}
.pcard:hover{z-index:2;box-shadow:0 12px 48px rgba(0,0,0,0.14);transform:translateY(-4px)}
.pcard-img{aspect-ratio:1;background:var(--cream);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pcard-img canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pcard-img .preal{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.pcard-overlay{position:absolute;inset:0;background:linear-gradient(transparent 35%,rgba(26,22,18,0.55));opacity:0;transition:opacity 0.3s;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:1.2rem;gap:0.4rem}
.pcard:hover .pcard-overlay{opacity:1}
.qadd{background:var(--gold);color:white;border:none;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.65rem 1.4rem;cursor:pointer;width:100%;transition:all 0.3s;transform:translateY(8px);font-weight:500}
.pcard:hover .qadd{transform:translateY(0)}
.qadd:hover{background:var(--text)}
.pbadge{position:absolute;top:10px;left:10px;font-size:0.54rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.25rem 0.65rem;color:white;z-index:1;font-weight:500}
.pinfo{padding:1.2rem 1.2rem 1.4rem}
.pname{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.15rem;margin-bottom:0.25rem;line-height:1.2;color:var(--text)}
.ptag{font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--light);margin-bottom:0.5rem}
.pprice{font-size:0.9rem;color:var(--gold);font-weight:500}
.pers-wrap{max-width:960px;margin:0 auto;padding:0 2.5rem 5rem}
.pers-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border)}
.pers-preview{background:var(--cream);padding:3rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem;border-right:1px solid var(--border)}
.pers-preview svg{width:240px;height:240px;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.12))}
.pers-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.3rem;text-align:center}
.pers-price{font-size:0.9rem;color:var(--gold)}
.pers-desc{font-size:0.64rem;color:var(--muted);text-align:center;line-height:1.8;max-width:200px}
.pers-opts{padding:2.5rem 2rem;display:flex;flex-direction:column;gap:1.6rem;overflow-y:auto}
.opt-label{font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:0.6rem}
.metal-row{display:flex;gap:0.6rem}
.mbtn{flex:1;border:1px solid var(--border);background:white;padding:0.7rem 0.5rem;cursor:pointer;font-size:0.58rem;letter-spacing:0.08em;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:5px;transition:all 0.2s}
.mbtn:hover,.mbtn.sel{border-color:var(--text);color:var(--text)}
.mbtn.sel{border-width:1.5px;background:var(--off)}
.mswatch{width:22px;height:22px;border-radius:50%;border:1px solid rgba(0,0,0,0.08)}
.bead-row{display:flex;gap:0.5rem;flex-wrap:wrap}
.bead{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all 0.2s;flex-shrink:0}
.bead.sel{border-color:var(--text);transform:scale(1.2)}
.shape-row{display:flex;gap:0.4rem;flex-wrap:wrap}
.spill{background:white;border:1px solid var(--border);padding:0.32rem 0.7rem;font-size:0.58rem;letter-spacing:0.06em;color:var(--muted);cursor:pointer;transition:all 0.2s}
.spill:hover,.spill.sel{background:var(--text);color:white;border-color:var(--text)}
.stone-row{display:flex;gap:0.4rem;flex-wrap:wrap}
.stpill{background:white;border:1px solid var(--border);padding:0.3rem 0.65rem;font-size:0.56rem;color:var(--muted);cursor:pointer;transition:all 0.2s}
.stpill:hover,.stpill.sel{background:var(--text);color:white;border-color:var(--text)}
.pers-actions{display:flex;flex-direction:column;gap:0.5rem;margin-top:0.4rem}
.btn{border:none;cursor:pointer;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.85rem 2rem;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-dark{background:var(--text);color:white}
.btn-dark:hover{background:var(--gold)}
.btn-outline{background:var(--text);color:white;border:1px solid var(--text)}
.btn-outline:hover{background:var(--gold);color:white;border-color:var(--gold)}
.btn-wa{background:white;color:#1a6130;border:1px solid rgba(26,97,48,0.4)}
.btn-wa:hover{background:#1a6130;color:white}
.btn-sm{padding:0.55rem 1.2rem;font-size:0.6rem}
.btn-full{width:100%}
.about-grid{display:grid;grid-template-columns:1fr 1.2fr;border:1px solid var(--border);max-width:880px;margin:0 auto}
.about-vis{background:var(--cream);display:flex;align-items:center;justify-content:center;padding:3.5rem;border-right:1px solid var(--border)}
.about-circ{width:200px;height:200px;border-radius:50%;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,0.1)}
.about-text{padding:3rem 2.5rem;display:flex;flex-direction:column;justify-content:center}
.about-text h2{font-size:2.2rem;font-style:italic;margin-bottom:1.2rem}
.about-text p{font-size:0.74rem;color:var(--muted);line-height:2;margin-bottom:0.8rem}
.pills{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:1.2rem;margin-bottom:1.5rem}
.pill{border:1px solid var(--border);padding:0.25rem 0.7rem;font-size:0.56rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.editorial{background:var(--text);color:white;padding:5rem 8vw;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.editorial-q{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3.2rem);font-style:italic;line-height:1.15;font-weight:300}
.editorial-q em{color:var(--gold-light);font-style:normal}
.editorial-body{font-size:0.74rem;color:rgba(255,255,255,0.55);line-height:2}
.editorial-body strong{color:rgba(255,255,255,0.85);font-weight:400}
.editorial-btns{display:flex;gap:0.6rem;margin-top:1.8rem}
.btn-gold{background:var(--gold);color:white;border:none;cursor:pointer;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.8rem 1.8rem;transition:background 0.2s}
.btn-gold:hover{background:var(--gold-light);color:var(--text)}
.btn-outline-white{background:none;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.25);cursor:pointer;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.8rem 1.8rem;transition:all 0.2s}
.btn-outline-white:hover{color:white;border-color:rgba(255,255,255,0.6)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s}
.overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;right:0;top:0;height:100%;width:360px;background:white;z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1)}
.overlay.open .drawer{transform:translateX(0)}
.drawer-head{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 1.8rem;border-bottom:1px solid var(--border)}
.drawer-head h2{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.2rem}
.drawer-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted);line-height:1}
.drawer-body{flex:1;overflow-y:auto;padding:1rem 1.8rem}
.drawer-empty{text-align:center;padding:4rem 0;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--light);font-size:1.1rem}
.cart-item{display:flex;gap:0.9rem;padding:1rem 0;border-bottom:1px solid var(--border);align-items:center}
.cart-thumb{width:56px;height:56px;background:var(--cream);flex-shrink:0;overflow:hidden}
.cart-thumb canvas{width:100%;height:100%}
.cart-item-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.95rem;line-height:1.2}
.cart-item-detail{font-size:0.58rem;color:var(--light);margin-top:0.15rem;letter-spacing:0.06em}
.cart-item-price{font-size:0.78rem;color:var(--gold);margin-top:0.25rem}
.cart-remove{background:none;border:none;cursor:pointer;color:var(--light);font-size:0.9rem;margin-left:auto;padding:0.2rem;transition:color 0.2s;flex-shrink:0}
.cart-remove:hover{color:var(--rose)}
.drawer-foot{padding:1.4rem 1.8rem;border-top:1px solid var(--border)}
.cart-total{display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:1rem;font-weight:400}
.cart-total span:last-child{color:var(--gold)}
.admin-wrap{min-height:100vh;background:#f4f4f2}
.admin-nav{background:var(--text);padding:0 2rem;height:58px;display:flex;align-items:center;justify-content:space-between}
.admin-nav-brand{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:white;opacity:0.9}
.admin-nav-right{display:flex;align-items:center;gap:1rem}
.admin-nav-right span{font-size:0.62rem;color:rgba(255,255,255,0.45);letter-spacing:0.08em}
.admin-body{max-width:1100px;margin:0 auto;padding:2.5rem 2rem}
.admin-h1{font-size:1.8rem;font-style:italic;margin-bottom:0.4rem}
.admin-sub{font-size:0.7rem;color:var(--muted);margin-bottom:2rem}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.2rem}
.admin-card{background:white;border:1px solid var(--border);overflow:hidden;transition:box-shadow 0.2s}
.admin-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.admin-img-wrap{aspect-ratio:1;background:var(--cream);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.admin-img-wrap canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.admin-img-wrap .areal{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.upload-zone{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(26,22,18,0.45);opacity:0;transition:opacity 0.2s;cursor:pointer}
.admin-card:hover .upload-zone{opacity:1}
.upload-inner{background:white;color:var(--text);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.5rem 1rem;display:flex;align-items:center;gap:5px}
.upload-inner input{display:none}
.admin-info{padding:1rem}
.afield{display:flex;flex-direction:column;gap:0.25rem;margin-bottom:0.7rem}
.afield label{font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.afield input{border:1px solid var(--border);padding:0.45rem 0.6rem;font-size:0.8rem;color:var(--text);outline:none;transition:border-color 0.2s;background:var(--off);width:100%}
.afield input:focus{border-color:var(--text);background:white}
.afield input.gold{color:var(--gold)}
.save-btn{background:var(--text);color:white;border:none;padding:0.55rem 1rem;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;width:100%;transition:background 0.2s}
.save-btn:hover{background:var(--gold)}
.saved{font-size:0.58rem;color:var(--sage);text-align:center;margin-top:0.5rem;height:14px;transition:opacity 0.3s}
.login-bg{position:fixed;inset:0;background:rgba(26,22,18,0.88);z-index:300;display:flex;align-items:center;justify-content:center}
.login-box{background:white;width:360px;padding:2.8rem 2.2rem}
.login-logo{display:flex;justify-content:center;margin-bottom:1.6rem}
.login-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.6rem;text-align:center;margin-bottom:0.3rem}
.login-sub{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:2rem}
.lfield{display:flex;flex-direction:column;gap:0.3rem;margin-bottom:1rem}
.lfield label{font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.lfield input{border:1px solid var(--border);border-bottom:2px solid var(--border);padding:0.7rem 0.8rem;font-size:0.88rem;outline:none;transition:border-color 0.2s;background:var(--off);width:100%}
.lfield input:focus{border-color:var(--text);background:white}
.login-err{font-size:0.63rem;color:var(--rose);text-align:center;margin-top:0.7rem;min-height:1rem}
.login-back{font-size:0.58rem;color:var(--muted);text-align:center;margin-top:1.2rem;cursor:pointer;transition:color 0.2s}
.login-back:hover{color:var(--text)}
footer{background:var(--text);color:rgba(255,255,255,0.45);padding:3.5rem 2.5rem 2rem}
.footer-top{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:3rem;margin-bottom:2.5rem;padding-bottom:2.5rem;border-bottom:1px solid rgba(255,255,255,0.08)}
.footer-brand{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.4rem;color:rgba(255,255,255,0.85);margin-bottom:0.8rem}
.footer-tagline{font-size:0.65rem;line-height:1.9;color:rgba(255,255,255,0.38)}
.footer-head{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.92rem;color:rgba(255,255,255,0.75);margin-bottom:0.9rem;font-weight:300}
.footer-link{font-size:0.63rem;line-height:2.2;color:rgba(255,255,255,0.38);text-decoration:none;display:block;cursor:pointer;transition:color 0.2s;background:none;border:none;text-align:left;letter-spacing:0.03em}
.footer-link:hover{color:rgba(255,255,255,0.75)}
.footer-bot{display:flex;justify-content:space-between;align-items:center;font-size:0.58rem;letter-spacing:0.06em}

function GoldSparkles(){const cvRef=useRef(null);useEffect(()=>{const canvas=cvRef.current;if(!canvas)return;const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;const particles=Array.from({length:28},()=>({x:Math.random()*W,y:Math.random()*H,r:1+Math.random()*2.5,vx:(Math.random()-0.5)*0.3,vy:-(0.2+Math.random()*0.4),alpha:Math.random(),dalpha:(Math.random()*0.008+0.003)*(Math.random()<0.5?1:-1),hue:40+Math.random()*20}));let raf;function tick(){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.alpha+=p.dalpha;if(p.alpha<=0||p.alpha>=1)p.dalpha*=-1;if(p.y<-10)p.y=H+10;if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,p.alpha))*0.7;ctx.fillStyle=`hsl(${p.hue},70%,55%)`;ctx.shadowBlur=8;ctx.shadowColor=`hsl(${p.hue},80%,60%)`;ctx.beginPath();for(let i=0;i<4;i++){const a=i*Math.PI/2;ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+Math.cos(a)*p.r*2,p.y+Math.sin(a)*p.r*2);}ctx.strokeStyle=`hsl(${p.hue},70%,55%)`;ctx.lineWidth=0.8;ctx.stroke();ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();});raf=requestAnimationFrame(tick);}tick();return()=>cancelAnimationFrame(raf);},[]);return<canvas ref={cvRef} width={520} height={700} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:1}}/>;}

function NosotrasPage({goPage}){return(<div className="page active"><section className="sec"><div className="about-grid"><div className="about-vis"><div className="about-circ"><img src="uploads/logo.jpg" alt="Diente de León" style={{width:'200px',height:'200px',objectFit:'cover',display:'block'}}/></div></div><div className="about-text"><h2>Nuestra historia</h2><p>Somos una boutique artesanal de Los Muermos, en el sur de Chile. Cada joya nace de manos dedicadas: alambrismo cuidadoso, mostacillas rocallas tejidas en técnica ladrillo que forman una trama firme y llena de textura.</p><p>Usamos bases bañadas en oro 18K y plata, con materiales 100% hipoalergénicos. Creemos que cada persona merece una joya tan única como ella.</p><p>Con más de 466 publicaciones y 4.200 seguidoras en Instagram, nuestra comunidad crece desde la autenticidad y el amor por el oficio artesanal.</p><div className="pills">{['Los Muermos','Hecho a mano','Hipoalergénico','Personalizable','Envío Chile'].map(t=><span key={t} className="pill">{t}</span>)}</div><div style={{display:'flex',gap:'0.7rem',flexWrap:'wrap'}}><button className="btn btn-dark" onClick={()=>goPage('catalog')}>Ver colección</button><button className="btn btn-outline" onClick={()=>window.open('https://www.instagram.com/joyeria_diente_de_leon','_blank')}>Instagram</button></div></div></div></section></div>);}
function CartDrawer({cart,onClose,onRemove,onCheckout}){const total=cart.reduce((s,i)=>s+i.price,0);const cvRefs=useRef({});useEffect(()=>{cart.forEach((item,i)=>{const cv=cvRefs.current[i];if(cv)drawOnCanvas(cv,{...item,metal:item.metal==='Oro 18K'?'gold':'silver'});});},[cart]);return(<div className="overlay open" onClick={onClose}><div className="drawer" onClick={e=>e.stopPropagation()}><div className="drawer-head"><h2>Tu carrito</h2><button className="drawer-close" onClick={onClose}>×</button></div><div className="drawer-body">{cart.length===0?<div className="drawer-empty">Tu carrito está vacío</div>:cart.map((item,i)=><div key={i} className="cart-item"><div className="cart-thumb"><canvas ref={el=>cvRefs.current[i]=el} width={56} height={56}/></div><div style={{flex:1}}><div className="cart-item-name">{item.name}</div><div className="cart-item-detail">{item.metal}</div><div className="cart-item-price">${item.price.toLocaleString('es-CL')}</div></div><button className="cart-remove" onClick={()=>onRemove(i)}>×</button></div>)}</div>{cart.length>0&&<div className="drawer-foot"><div className="cart-total"><span>Total</span><span>${total.toLocaleString('es-CL')}</span></div><button className="btn btn-dark btn-full" onClick={onCheckout}>Finalizar por WhatsApp</button></div>}</div></div>);}
function AdminCard({p,photos,onPhotoUpload,onSave}){const cvRef=useRef(null);const [name,setName]=useState(p.name);const [price,setPrice]=useState(p.price);const [saved,setSaved]=useState(false);useEffect(()=>{if(cvRef.current&&!photos[p.id])drawOnCanvas(cvRef.current,p);},[p,photos]);function handleSave(){onSave(p.id,name,price);setSaved(true);setTimeout(()=>setSaved(false),2000);}return(<div className="admin-card"><div className="admin-img-wrap"><canvas ref={cvRef} width={200} height={200} style={{display:photos[p.id]?'none':'block'}}/>{photos[p.id]&&<img className="areal" src={photos[p.id]} alt={p.name} style={{display:'block'}}/>}<label className="upload-zone"><div className="upload-inner"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Subir foto</div><input type="file" accept="image/*" style={{display:'none'}} onChange={e=>onPhotoUpload(e,p.id)}/></label></div><div className="admin-info"><div className="afield"><label>Nombre</label><input value={name} onChange={e=>setName(e.target.value)}/></div><div className="afield"><label>Precio (CLP)</label><input type="number" className="gold" value={price} step={100} onChange={e=>setPrice(parseInt(e.target.value)||p.price)}/></div><button className="save-btn" onClick={handleSave}>Guardar cambios</button><div className="saved" style={{opacity:saved?1:0}}>✓ Guardado</div></div></div>);}
function AdminPanel({onLogout}){const [products,setProducts]=useState(loadProds);const [photos,setPhotos]=useState(loadPhotos);function handlePhotoUpload(e,id){const f=e.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>{const data=ev.target.result;const np={...photos,[id]:data};setPhotos(np);savePhotos(np);};reader.readAsDataURL(f);}function handleSave(id,name,price){const np=products.map(p=>p.id===id?{...p,name,price}:p);setProducts(np);saveProds(np);}return(<div className="admin-wrap"><div className="admin-nav"><div className="admin-nav-brand">Diente de León · Admin</div><div className="admin-nav-right"><span>andrea</span><button className="btn btn-sm" style={{background:'none',color:'rgba(255,255,255,0.65)',border:'1px solid rgba(255,255,255,0.25)'}} onClick={onLogout}>Cerrar sesión</button></div></div><div className="admin-body"><h1 className="admin-h1">Panel de productos</h1><p className="admin-sub">Sube fotos y edita nombre y precio. Los cambios se reflejan en la tienda al instante.</p><div className="admin-grid">{products.map(p=><AdminCard key={p.id} p={p} photos={photos} onPhotoUpload={handlePhotoUpload} onSave={handleSave}/>)}</div></div></div>);}
function LoginModal({onLogin,onClose}){const [user,setUser]=useState('');const [pass,setPass]=useState('');const [err,setErr]=useState('');function attempt(){if(user==='andrea'&&pass==='dientedeleon2025'){onLogin();}else{setErr('Usuario o contraseña incorrectos');setPass('');}}return(<div className="login-bg"><div className="login-box"><div className="login-logo"><LogoImg size={80}/></div><div className="login-title">Panel de Administración</div><div className="login-sub">Diente de León Boutique</div><div className="lfield"><label>Usuario</label><input value={user} onChange={e=>setUser(e.target.value)} placeholder="admin"/></div><div className="lfield"><label>Contraseña</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&attempt()} placeholder="••••••••"/></div><button className="btn btn-dark btn-full" style={{marginTop:'0.5rem'}} onClick={attempt}>Ingresar</button><div className="login-err">{err}</div><div className="login-back" onClick={onClose}>← Volver a la tienda</div></div></div>);}
